name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Never run two deploys concurrently.
concurrency:
  group: deploy
  cancel-in-progress: false

env:
  PROJECT_ID: no-meeting-overtime
  REGION: europe-west1
  REPOSITORY: repo
  IMAGE_NAME: no-meeting-overtime
  SERVICE: app
  RUNTIME_SA: backend-app@no-meeting-overtime.iam.gserviceaccount.com

jobs:
  # ---- Backend: build the api image and deploy to Cloud Run --------------------
  deploy-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for Workload Identity Federation
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF -> cloud-build SA)
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: projects/44054328514/locations/global/workloadIdentityPools/github/providers/fvclaus
          service_account: cloud-build@no-meeting-overtime.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${IMAGE_NAME}:${GITHUB_SHA}"
          docker build -f apps/api/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        id: deploy
        run: |
          gcloud run deploy "$SERVICE" \
            --image="$IMAGE" \
            --region="$REGION" \
            --service-account="$RUNTIME_SA" \
            --allow-unauthenticated \
            --no-cpu-boost \
            --memory=512Mi \
            --set-env-vars=CLIENT_ID=${{ vars.CLIENT_ID }} \
            --set-env-vars=PROJECT_ID=${{ vars.PROJECT_ID }} \
            --set-env-vars=QUEUE_LOCATION=${{ vars.QUEUE_LOCATION }} \
            --set-env-vars=SITE_BASE=${{ vars.SITE_BASE }} \
            --set-env-vars=CLOUD_TASKS_SERVICE_ACCOUNT=${{ vars.CLOUD_TASKS_SERVICE_ACCOUNT }} \
            --set-secrets=CLIENT_SECRET=client-secret:latest
          URL="$(gcloud run services describe "$SERVICE" --region "$REGION" --format='value(status.url)')"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          # Cloud Tasks should call the backend directly (skip the Cloudflare hop);
          # the OIDC audience stays SITE_BASE and is verified against it.
          gcloud run services update "$SERVICE" --region "$REGION" \
            --update-env-vars=SITE_BASE_CLOUD_TASKS="$URL"

  # ---- Frontend: build with OpenNext and deploy the Worker --------------------
  deploy-web:
    runs-on: ubuntu-latest
    needs: deploy-api
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & deploy to Cloudflare (Worker "hangup")
        working-directory: apps/web
        env:
          # account_id is in wrangler.jsonc, so only the API token is a secret.
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # Baked into the local-dev Next rewrite; the deployed worker reads
          # API_ORIGIN from wrangler.jsonc vars at runtime. Set here too so a
          # build-time reference stays consistent with the deployed backend.
          API_ORIGIN: ${{ needs.deploy-api.outputs.url }}
        run: |
          pnpm exec opennextjs-cloudflare build
          pnpm exec opennextjs-cloudflare deploy
