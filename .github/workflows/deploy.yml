name: Deploy

on:
  push:
    branches:
      - main

# Never run two deploys against the same Cloud Run service concurrently.
concurrency:
  group: deploy-cloud-run
  cancel-in-progress: false

env:
  PROJECT_ID: no-meeting-overtime
  REGION: europe-west1
  REPOSITORY: repo
  IMAGE_NAME: no-meeting-overtime
  SERVICE: app
  RUNTIME_SA: backend-app@no-meeting-overtime.iam.gserviceaccount.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for Workload Identity Federation
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF -> cloud-build SA)
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: projects/44054328514/locations/global/workloadIdentityPools/github/providers/fvclaus
          service_account: cloud-build@no-meeting-overtime.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${IMAGE_NAME}:${GITHUB_SHA}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE" \
            --image="$IMAGE" \
            --region="$REGION" \
            --service-account="$RUNTIME_SA" \
            --allow-unauthenticated \
            --no-cpu-boost \
            --memory=265Mi \
            --set-env-vars=CLIENT_ID=${{ vars.CLIENT_ID }} \
            --set-env-vars=PROJECT_ID=${{ vars.PROJECT_ID }} \
            --set-env-vars=QUEUE_LOCATION=${{ vars.QUEUE_LOCATION }} \
            --set-env-vars=SITE_BASE=${{ vars.SITE_BASE }} \
            --set-env-vars=CLOUD_TASKS_SERVICE_ACCOUNT=${{ vars.CLOUD_TASKS_SERVICE_ACCOUNT }} \
            --set-secrets=CLIENT_SECRET=client-secret:latest
